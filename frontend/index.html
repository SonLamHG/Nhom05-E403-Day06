<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VinBiocare AI – Chatbot Sức khỏe</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* ── DESIGN TOKENS ───────────────────────────── */
        :root {
            --primary:      #0f2d4e;
            --primary-mid:  #1a4a7a;
            --accent:       #0ea5e9;
            --accent-dark:  #0369a1;
            --accent-bg:    #e0f2fe;
            --success:      #059669;
            --success-bg:   #d1fae5;
            --warning:      #d97706;
            --warning-bg:   #fef3c7;
            --danger:       #dc2626;
            --danger-bg:    #fee2e2;
            --bg:           #f1f5f9;
            --surface:      #ffffff;
            --surface-2:    #f8fafc;
            --border:       #e2e8f0;
            --border-mid:   #cbd5e1;
            --text:         #0f172a;
            --text-2:       #475569;
            --text-3:       #94a3b8;
            --sidebar-w:    340px;
            --r-sm:         8px;
            --r:            12px;
            --sh-sm:        0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --sh:           0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
            --sh-lg:        0 10px 30px rgba(0,0,0,0.10), 0 4px 10px rgba(0,0,0,0.06);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: 'Be Vietnam Pro', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            height: 100%;
            overflow: hidden;
            color: var(--text);
            font-size: 15px;
            line-height: 1.6;
            font-weight: 500;
            -webkit-font-smoothing: antialiased;
        }

        /* ── DESKTOP LAYOUT ──────────────────────────── */
        .layout {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        /* HEADER — full width */
        .header {
            background: var(--primary);
            color: white;
            padding: 0 28px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
            z-index: 10;
        }

        .header::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        .header-avatar-wrap { position: relative; }

        .header-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.22);
            display: block;
        }

        .header-avatar-fallback {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 1.05em;
            border: 2px solid rgba(255,255,255,0.22);
        }

        .online-dot {
            position: absolute;
            bottom: 1px; right: 1px;
            width: 9px; height: 9px;
            background: #22c55e;
            border-radius: 50%;
            border: 2px solid var(--primary);
            animation: pulse-ring 2.5s ease-in-out infinite;
        }

        @keyframes pulse-ring {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.45); }
            50%       { box-shadow: 0 0 0 5px rgba(34,197,94,0); }
        }

        .header-title {
            font-size: 1.05em;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .header-tagline {
            font-size: 0.72em;
            opacity: 0.60;
            font-weight: 400;
            margin-top: 1px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        .online-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(34,197,94,0.15);
            color: #86efac;
            border: 1px solid rgba(34,197,94,0.25);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.72em;
            font-weight: 700;
        }

        .online-badge::before {
            content: '';
            width: 6px; height: 6px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }

        .header-disclaimer {
            font-size: 0.68em;
            font-weight: 600;
            color: #92400e;
            background: #fef3c7;
            border: 1px solid #fcd34d;
            border-radius: 6px;
            padding: 3px 8px;
        }

        /* MAIN CONTENT — two columns */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── SIDEBAR ─────────────────────────────────── */
        .sidebar {
            width: var(--sidebar-w);
            flex-shrink: 0;
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar::-webkit-scrollbar { width: 3px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 3px; }

        .sidebar-inner {
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            flex: 1;
        }

        /* Welcome state in sidebar */
        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }

        .brand-icon {
            width: 42px; height: 42px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary), var(--primary-mid));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            flex-shrink: 0;
        }

        .brand-name {
            font-size: 0.95em;
            font-weight: 700;
            color: var(--primary);
        }

        .brand-sub {
            font-size: 0.72em;
            color: var(--text-3);
            font-weight: 400;
            margin-top: 1px;
        }

        .sidebar-section-label {
            font-size: 0.67em;
            font-weight: 700;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.09em;
            margin-bottom: 8px;
        }

        .feature-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .feature-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 12px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
        }

        .feature-item-icon {
            font-size: 1.2em;
            flex-shrink: 0;
            line-height: 1;
            margin-top: 1px;
        }

        .feature-item-text strong {
            display: block;
            font-size: 0.82em;
            font-weight: 700;
            color: var(--text);
            line-height: 1.3;
        }

        .feature-item-text span {
            font-size: 0.74em;
            color: var(--text-3);
            font-weight: 400;
        }

        /* Demo scenarios in sidebar */
        .scenario-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .scenario-chip {
            padding: 4px 12px;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.74em;
            font-weight: 600;
            color: var(--text-2);
            font-family: inherit;
            transition: all 0.15s;
        }

        .scenario-chip:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* ── TRIAGE BANNER (in sidebar) ──────────────── */
        .triage-banner {
            display: flex;
            align-items: flex-start;
            gap: 9px;
            border-radius: var(--r-sm);
            padding: 10px 13px;
            font-size: 0.82em;
            font-weight: 600;
            line-height: 1.45;
            animation: fadeUp 0.25s ease both;
        }

        .triage-banner.urgent {
            background: var(--danger-bg);
            border: 1.5px solid #fca5a5;
            border-left: 4px solid var(--danger);
            color: #991b1b;
        }

        .triage-banner.monitor {
            background: var(--warning-bg);
            border: 1.5px solid #fcd34d;
            border-left: 4px solid var(--warning);
            color: #92400e;
        }

        .triage-icon { font-size: 1.1em; flex-shrink: 0; margin-top: 1px; }

        /* ── RULE CARD (in sidebar) ──────────────────── */
        .rule-card { animation: fadeUp 0.28s ease both; }

        .rule-card-title {
            font-size: 0.67em;
            font-weight: 700;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.09em;
            margin-bottom: 10px;
        }

        .ind-group-label {
            font-size: 0.65em;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 4px 0 5px;
            margin-top: 2px;
        }
        .ind-group-label.red    { color: var(--danger); }
        .ind-group-label.yellow { color: var(--warning); }
        .ind-group-label.green  { color: var(--success); }
        .ind-group-label.gray   { color: var(--text-3); }

        .indicator-row {
            padding: 8px 10px;
            border-radius: var(--r-sm);
            margin-bottom: 6px;
        }
        .indicator-row.green  { background: var(--success-bg); }
        .indicator-row.yellow { background: var(--warning-bg); }
        .indicator-row.red    { background: var(--danger-bg); }
        .indicator-row.gray   { background: var(--surface-2); }

        .ind-header {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-bottom: 6px;
        }

        .ind-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .ind-dot.green  { background: var(--success); }
        .ind-dot.yellow { background: var(--warning); }
        .ind-dot.red    { background: var(--danger); }
        .ind-dot.gray   { background: var(--text-3); }

        .ind-name { flex: 1; font-weight: 600; font-size: 0.84em; color: var(--text); }

        .ind-val-wrap { text-align: right; }
        .ind-val { font-weight: 700; font-size: 0.88em; white-space: nowrap; }
        .ind-ref { font-size: 0.65em; color: var(--text-3); font-weight: 400; white-space: nowrap; }

        .ind-status {
            font-size: 0.66em;
            padding: 2px 7px;
            border-radius: 20px;
            color: white;
            font-weight: 700;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .ind-status.green  { background: var(--success); }
        .ind-status.yellow { background: var(--warning); }
        .ind-status.red    { background: var(--danger); }
        .ind-status.gray   { background: var(--text-3); }

        /* Progress bar */
        .progress-track {
            position: relative;
            height: 4px;
            background: rgba(0,0,0,0.07);
            border-radius: 10px;
            overflow: visible;
        }

        .progress-normal-zone {
            position: absolute;
            top: 0; height: 100%;
            background: rgba(5,150,105,0.25);
            border-radius: 10px;
        }

        .progress-marker {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 10px; height: 10px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 1px 4px rgba(0,0,0,0.22);
            z-index: 2;
        }
        .progress-marker.green  { background: var(--success); }
        .progress-marker.yellow { background: var(--warning); }
        .progress-marker.red    { background: var(--danger); }
        .progress-marker.gray   { background: var(--text-3); }

        .vinmec-cta {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--success), #047857);
            color: white;
            padding: 10px 13px;
            border-radius: var(--r-sm);
            margin-top: 8px;
            font-size: 0.8em;
            font-weight: 700;
            cursor: pointer;
        }

        /* ── CHAT PANEL ──────────────────────────────── */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 4px; }

        /* Empty state in chat */
        .chat-empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-3);
            font-size: 0.88em;
            text-align: center;
            padding: 40px;
            animation: fadeUp 0.4s ease both;
        }

        .chat-empty-inner { max-width: 320px; }
        .chat-empty-icon { font-size: 2.5em; display: block; margin-bottom: 12px; }
        .chat-empty-title { font-weight: 700; color: var(--text-2); margin-bottom: 6px; font-size: 1.05em; }
        .chat-empty-sub { font-size: 0.92em; line-height: 1.6; }

        /* ── MESSAGE ROWS ────────────────────────────── */
        .msg-row {
            display: flex;
            gap: 10px;
            max-width: 780px;
            width: 100%;
            animation: fadeUp 0.22s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .msg-row.user {
            align-self: flex-end;
            flex-direction: row-reverse;
            max-width: 620px;
        }
        .msg-row.bot { align-self: flex-start; }

        .msg-avatar-wrap { flex-shrink: 0; padding-top: 2px; }

        .msg-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65em;
            font-weight: 800;
            color: white;
            box-shadow: var(--sh-sm);
        }

        .msg-row.user .msg-avatar-wrap { display: none; }

        .msg-content { display: flex; flex-direction: column; gap: 3px; }
        .msg-row.user .msg-content { align-items: flex-end; }

        .msg-time {
            font-size: 0.62em;
            color: var(--text-3);
            font-weight: 400;
            padding: 0 4px;
        }

        .msg-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 4px;
        }

        .feedback-btn {
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-2);
            border-radius: 999px;
            width: 30px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            font-size: 0.92em;
            line-height: 1;
            cursor: pointer;
            transition: 0.15s ease;
        }

        .feedback-btn:hover {
            border-color: var(--accent);
            color: var(--accent-dark);
        }

        .feedback-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .feedback-btn.active {
            background: var(--accent-bg);
            border-color: var(--accent);
            color: var(--accent-dark);
        }

        .feedback-status {
            font-size: 0.68em;
            color: var(--text-3);
        }

        .feedback-btn.report {
            width: auto;
            padding: 0 10px;
            font-size: 0.74em;
            font-weight: 700;
        }

        .msg-tools {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .response-state {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 12px;
            box-shadow: var(--sh-sm);
        }

        .response-state.happy {
            background: var(--success-bg);
            border-color: #86efac;
        }

        .response-state.low {
            background: var(--warning-bg);
            border-color: #fcd34d;
        }

        .response-state-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 4px;
        }

        .response-state-title {
            font-size: 0.78em;
            font-weight: 800;
            color: var(--text);
        }

        .confidence-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 0.68em;
            font-weight: 800;
            white-space: nowrap;
        }

        .response-state.happy .confidence-pill {
            background: rgba(5, 150, 105, 0.14);
            color: #065f46;
        }

        .response-state.low .confidence-pill {
            background: rgba(217, 119, 6, 0.14);
            color: #92400e;
        }

        .response-state-copy {
            font-size: 0.76em;
            color: var(--text-2);
            line-height: 1.55;
        }

        .response-state-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .response-cta {
            border: none;
            border-radius: 999px;
            padding: 7px 12px;
            font-size: 0.74em;
            font-weight: 800;
            font-family: inherit;
            cursor: pointer;
            transition: 0.15s ease;
        }

        .response-state.happy .response-cta {
            background: var(--success);
            color: white;
        }

        .response-state.low .response-cta {
            background: var(--warning);
            color: white;
        }

        .response-cta:hover {
            transform: translateY(-1px);
            box-shadow: var(--sh-sm);
        }

        .response-state-status {
            font-size: 0.68em;
            color: var(--text-2);
        }

        .confidence-banner {
            border-radius: var(--r-sm);
            padding: 10px 13px;
            font-size: 0.8em;
            font-weight: 600;
            line-height: 1.45;
            animation: fadeUp 0.25s ease both;
        }

        .confidence-banner.high {
            background: var(--success-bg);
            border: 1.5px solid #86efac;
            color: #065f46;
        }

        .confidence-banner.low {
            background: var(--warning-bg);
            border: 1.5px solid #fcd34d;
            color: #92400e;
        }

        /* ── BUBBLES ─────────────────────────────────── */
        .bubble {
            padding: 11px 16px;
            border-radius: 16px;
            line-height: 1.65;
            font-size: 0.92em;
            font-weight: 500;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .msg-row.user .bubble {
            background: linear-gradient(135deg, var(--primary), var(--primary-mid));
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: var(--sh);
        }

        .msg-row.bot .bubble {
            background: var(--surface);
            color: var(--text);
            border-bottom-left-radius: 4px;
            box-shadow: var(--sh);
        }

        .bubble.typing { color: var(--text-3); font-style: italic; font-weight: 400; }

        .bubble strong, .bubble b { font-weight: 700; color: var(--primary); }
        .bubble em, .bubble i { font-style: italic; }
        .bubble ul, .bubble ol { margin: 6px 0 2px; padding: 0; list-style: none; }
        .bubble li {
            padding: 5px 11px;
            margin-bottom: 4px;
            background: var(--surface-2);
            border-left: 3px solid var(--accent);
            border-radius: 0 6px 6px 0;
            font-size: 0.93em;
            line-height: 1.5;
        }
        .bubble p { margin-bottom: 5px; }
        .bubble p:last-child { margin-bottom: 0; }
        .bubble code {
            background: var(--accent-bg);
            color: var(--accent-dark);
            padding: 1px 5px;
            border-radius: 4px;
            font-size: 0.86em;
            font-family: 'SF Mono', Monaco, monospace;
        }
        .bubble ol { counter-reset: step; }
        .bubble ol li { counter-increment: step; border-left-color: var(--success); }
        .bubble ol li::before {
            content: counter(step);
            background: var(--success);
            color: white;
            font-size: 0.68em;
            font-weight: 700;
            width: 15px; height: 15px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 6px;
            vertical-align: middle;
        }
        .bubble .hl-danger  { color: var(--danger);  font-weight: 700; }
        .bubble .hl-warning { color: var(--warning); font-weight: 700; }
        .bubble .hl-safe    { color: var(--success); font-weight: 700; }
        .bubble .hl-info    { color: var(--accent);  font-weight: 600; }
        .bubble hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }

        /* ── QUICK ACTIONS ───────────────────────────── */
        .quick-actions {
            display: none;
            gap: 7px;
            padding: 8px 28px;
            flex-wrap: wrap;
            background: var(--bg);
            flex-shrink: 0;
        }

        .quick-actions.visible {
            display: flex;
            animation: slideUp 0.3s ease both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .quick-btn {
            padding: 5px 14px;
            border: 1.5px solid var(--accent);
            background: white;
            color: var(--accent);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.78em;
            font-weight: 700;
            font-family: inherit;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .quick-btn:hover { background: var(--accent); color: white; }

        /* ── INPUT AREA ──────────────────────────────── */
        .input-area {
            display: flex;
            gap: 10px;
            padding: 12px 28px 14px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            align-items: flex-end;
        }

        .input-area textarea {
            flex: 1;
            padding: 10px 18px;
            border: 1.5px solid var(--border);
            border-radius: 24px;
            font-size: 0.92em;
            font-family: inherit;
            font-weight: 500;
            resize: none;
            outline: none;
            max-height: 100px;
            min-height: 42px;
            line-height: 1.5;
            background: var(--bg);
            color: var(--text);
            transition: border-color 0.15s, background 0.15s;
        }

        .input-area textarea:focus { border-color: var(--accent); background: white; }
        .input-area textarea::placeholder { color: var(--text-3); }

        .send-btn {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 2px 8px rgba(14,165,233,0.38);
        }

        .send-btn:hover { transform: scale(1.07); box-shadow: 0 4px 14px rgba(14,165,233,0.5); }
        .send-btn:disabled { opacity: 0.42; cursor: not-allowed; transform: none; box-shadow: none; }
        .send-btn svg { width: 16px; height: 16px; }

        /* ── UPLOAD BUTTON ─────────────────────────── */
        .upload-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 1.5px solid var(--border-mid);
            background: var(--surface-2);
            color: var(--text-2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .upload-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
        .upload-btn svg { width: 16px; height: 16px; }

        /* ── IMAGE PREVIEW BAR ─────────────────────── */
        .image-preview-bar {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 8px 20px;
            background: var(--accent-bg);
            border-top: 1px solid var(--border);
        }

            height: 40px;
            border-radius: 6px;
            object-fit: cover;
        }
        .image-preview-bar .preview-name {
            font-size: 0.82em;
            color: var(--text-2);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .image-preview-bar .preview-remove {
            width: 24px; height: 24px;
            border-radius: 50%;
            border: none;
            background: rgba(0,0,0,0.08);
            color: var(--text-2);
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .image-preview-bar .preview-remove:hover { background: var(--danger-bg); color: var(--danger); }

        .input-hint {
            font-size: 0.68em;
            color: var(--text-3);
            padding: 4px 28px 8px;
            background: var(--surface);
            font-weight: 400;
        }

        /* ── MOBILE FALLBACK (< 768px) ───────────────── */
        @media (max-width: 767px) {
            .sidebar { display: none; }
            .chat-container { padding: 14px 12px 8px; }
            .quick-actions { padding: 7px 12px; }
            .input-area { padding: 10px 12px 12px; }
            .input-hint { padding: 3px 12px 6px; }
            .image-preview-bar { padding: 6px 12px; }
            .header { padding: 0 16px; }
            .header-disclaimer { display: none; }
            .msg-row { max-width: 92%; }
            .msg-row.user { max-width: 82%; }
        }
    </style>
</head>

    <script>
        const SCENARIOS = {
            cardiac:  "LDL:165 HDL:32 BP_Systolic:135 BP_Diastolic:88",
            diabetes: "Glucose:155 Insulin:1.2 BMI:33.6 SkinThickness:35 DiabetesPedigreeFunction:0.627",
            kidney:   "Creatinine:2.1 BP_Systolic:148 BP_Diastolic:92",
            normal:   "Glucose:90 Insulin:12 BMI:22 BP_Systolic:115 BP_Diastolic:75 LDL:85 HDL:55",
            mixed:    "LDL:170 HDL:33 Glucose:148 BP_Systolic:142 BP_Diastolic:94 BMI:30.2 Insulin:0 SkinThickness:35"
        };

        let conversationHistory = [];
        let lastRuleOutput     = null;
        let hasAnalyzed        = false;
        let selectedImageFile  = null;
        let feedbackCounter    = 0;
        const feedbackStore    = new Map();
        const sessionId        = (() => {
            if (window.crypto && typeof window.crypto.randomUUID === "function") {
                return window.crypto.randomUUID();
            }
            return `session-${Date.now()}-${Math.random().toString(16).slice(2)}`;
        })();

        // ── Markdown parser ──────────────────────────
        function renderMarkdown(text) {
            text = text.replace(/\r\n/g, '\n');
            const lines = text.split('\n');
            const blocks = [];
            let currentList = null;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const ulMatch = line.match(/^[\-\*]\s+(.+)$/);
                const olMatch = line.match(/^\d+\.\s+(.+)$/);

                if (ulMatch) {
                    if (!currentList || currentList.type !== 'ul') {
                        if (currentList) blocks.push(currentList);
                        currentList = { type: 'ul', items: [] };
                    }
                    currentList.items.push(ulMatch[1]);
                } else if (olMatch) {
                    if (!currentList || currentList.type !== 'ol') {
                        if (currentList) blocks.push(currentList);
                        currentList = { type: 'ol', items: [] };
                    }
                    currentList.items.push(olMatch[1]);
                } else {
                    if (currentList) { blocks.push(currentList); currentList = null; }
                    if (line.trim() === '') {
                        blocks.push({ type: 'break' });
                    } else {
                        const last = blocks[blocks.length - 1];
                        if (last && last.type === 'text') {
                            last.content += '\n' + line;
                        } else {
                            blocks.push({ type: 'text', content: line });
                        }
                    }
                }
            }
            if (currentList) blocks.push(currentList);

            let html = '';
            for (const block of blocks) {
                if (block.type === 'break') continue;
                else if (block.type === 'ul' || block.type === 'ol') {
                    const tag = block.type;
                    html += `<${tag}>` +
                        block.items.map(i => `<li>${inlineFormat(i)}</li>`).join('') +
                        `</${tag}>`;
                } else if (block.type === 'text') {
                    html += `<p>${inlineFormat(block.content)}</p>`;
                }
            }
            return html || '<p></p>';
        }

        function inlineFormat(text) {
            text = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/__(.+?)__/g, '<strong>$1</strong>');
            text = text.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
            text = text.replace(/(?<!_)_(?!_)(.+?)(?<!_)_(?!_)/g, '<em>$1</em>');
            text = text.replace(/`(.+?)`/g, '<code>$1</code>');
            text = text.replace(/\b(nguy hiểm|nguy cơ cao|mức cao|quá cao|rất cao|danger)\b/gi,
                '<span class="hl-danger">$1</span>');
            text = text.replace(/\b(cảnh báo|hơi cao|hơi thấp|chú ý|warning)\b/gi,
                '<span class="hl-warning">$1</span>');
            text = text.replace(/\b(bình thường|ổn định|an toàn|tốt|normal)\b/gi,
                '<span class="hl-safe">$1</span>');
            text = text.replace(/\n/g, '<br>');
            return text;
        }

        // ── Helpers ──────────────────────────────────
        function nowHHMM() {
            const d = new Date();
            return d.getHours().toString().padStart(2,'0') + ':' +
                   d.getMinutes().toString().padStart(2,'0');
        }

        function escapeHtml(text) {
            const d = document.createElement("div");
            d.textContent = text;
            return d.innerHTML;
        }

        function getFlowState(ruleOutput) {
            if (!ruleOutput) return null;
            return ruleOutput.low_confidence ? "low_confidence" : "happy";
        }

        function formatConfidence(confidence) {
            if (typeof confidence !== "number" || Number.isNaN(confidence)) return "";
            return `${Math.round(confidence * 100)}%`;
        }

        function buildShareText(userInput, aiResponse, ruleOutput = null) {
            const lines = [
                "Tom tat tu VinBiocare AI",
                `Cau hoi/du lieu: ${userInput}`,
            ];

            if (ruleOutput?.summary) {
                lines.push(`Tom tat phan tich: ${ruleOutput.summary}`);
            }

            if (typeof ruleOutput?.confidence_overall === "number") {
                lines.push(`Do tin cay phan tich: ${formatConfidence(ruleOutput.confidence_overall)}`);
            }

            lines.push(`Giai thich AI: ${aiResponse}`);
            return lines.join("\n");
        }

        function buildFeedbackPayload(userInput, aiResponse, ruleOutput = null) {
            if (!userInput || !aiResponse) return null;

            return {
                session_id: sessionId,
                user_input: userInput,
                ai_response: aiResponse,
                flow_state: getFlowState(ruleOutput),
                confidence: typeof ruleOutput?.confidence_overall === "number"
                    ? ruleOutput.confidence_overall
                    : null,
                source: ruleOutput ? "rule_output_chat" : "free_chat",
                has_structured_context: Boolean(ruleOutput),
                share_text: buildShareText(userInput, aiResponse, ruleOutput),
            };
        }

        async function postFeedback(payload, correctionType, extra = {}) {
            const body = {
                session_id: payload.session_id,
                user_input: payload.user_input,
                ai_response: payload.ai_response,
                correction_type: correctionType,
                flow_state: payload.flow_state,
                confidence: payload.confidence,
                source: payload.source,
                ...extra,
            };

            const resp = await fetch("/api/feedback/correction", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });

            if (!resp.ok) {
                throw new Error("Khong gui duoc feedback");
            }

            return resp.json();
        }

        function getResponseStateConfig(payload) {
            if (!payload?.has_structured_context) return null;

            const confidenceText = formatConfidence(payload.confidence);
            if (payload.flow_state === "low_confidence") {
                return {
                    kind: "low",
                    title: "Giai thich nay can xac nhan bac si",
                    copy: "He thong phat hien do chac chan chua cao. Ban nen xac nhan them voi bac si truoc khi dua ra quyet dinh.",
                    pill: confidenceText ? `Do tin cay ${confidenceText}` : "Can xac nhan them",
                    ctaLabel: "Chat voi bac si ngay 30 phut",
                    ctaAction: "requestDoctorReview",
                };
            }

            return {
                kind: "happy",
                title: "Phan tich dang o trang thai tu tin",
                copy: "Ban co the luu nhanh phan giai thich nay de chia se voi bac si o buoc tham van tiep theo.",
                pill: confidenceText ? `Do tin cay ${confidenceText}` : "Do tin cay tot",
                ctaLabel: "Luu de chia se bac si",
                ctaAction: "saveForDoctor",
            };
        }

        function renderResponseState(feedbackId, payload) {
            const config = getResponseStateConfig(payload);
            if (!config) return "";

            return `
                <div class="response-state ${config.kind}">
                    <div class="response-state-head">
                        <span class="response-state-title">${escapeHtml(config.title)}</span>
                        <span class="confidence-pill">${escapeHtml(config.pill)}</span>
                    </div>
                    <div class="response-state-copy">${escapeHtml(config.copy)}</div>
                    <div class="response-state-actions">
                        <button class="response-cta"
                                onclick="${config.ctaAction}('${feedbackId}', this)">${escapeHtml(config.ctaLabel)}</button>
                        <span class="response-state-status"></span>
                    </div>
                </div>`;
        }

        async function submitFeedback(feedbackId, correctionType, button) {
            const payload = feedbackStore.get(feedbackId);
            if (!payload) return;

            const actionWrap = button.closest(".msg-actions");
            const statusEl = actionWrap?.querySelector(".feedback-status");
            const buttons = actionWrap ? Array.from(actionWrap.querySelectorAll(".feedback-btn")) : [];

            buttons.forEach((btn) => { btn.disabled = true; });
            if (statusEl) statusEl.textContent = "Dang gui...";

            try {
                const result = await postFeedback(payload, correctionType, {
                    needs_review: correctionType === "negative",
                    feedback_reason: correctionType === "negative"
                        ? "user_disliked_response"
                        : null,
                });

                buttons.forEach((btn) => { btn.classList.remove("active"); });
                if (button) button.classList.add("active");

                if (statusEl) {
                    statusEl.textContent = correctionType === "positive"
                        ? "Da ghi nhan like. Ban co the doi lua chon."
                        : (result.queued_for_review
                            ? "Da ghi nhan dislike. Phan hoi nay da vao review queue."
                            : "Da ghi nhan dislike. Ban co the doi lua chon.");
                }
            } catch (err) {
                if (statusEl) statusEl.textContent = err.message || "Gui feedback that bai";
            } finally {
                buttons.forEach((btn) => { btn.disabled = false; });
            }
        }

        async function requestDoctorReview(feedbackId, button) {
            const payload = feedbackStore.get(feedbackId);
            if (!payload) return;

            const wrap = button.closest(".response-state");
            const statusEl = wrap?.querySelector(".response-state-status");
            button.disabled = true;
            if (statusEl) statusEl.textContent = "Dang chuyen yeu cau...";

            try {
                const result = await postFeedback(payload, "doctor_review", {
                    needs_review: true,
                    feedback_reason: "doctor_confirmation_requested",
                });

                if (statusEl) {
                    statusEl.textContent = result.queued_for_review
                        ? "Da dua ca nay vao review queue de bac si xac nhan."
                        : "Da ghi nhan yeu cau xac nhan.";
                }
            } catch (err) {
                if (statusEl) statusEl.textContent = err.message || "Khong gui duoc yeu cau.";
            } finally {
                button.disabled = false;
            }
        }

        async function saveForDoctor(feedbackId, button) {
            const payload = feedbackStore.get(feedbackId);
            if (!payload) return;

            const wrap = button.closest(".response-state");
            const statusEl = wrap?.querySelector(".response-state-status");
            if (statusEl) statusEl.textContent = "";

            try {
                if (navigator.share) {
                    await navigator.share({
                        title: "VinBiocare AI",
                        text: payload.share_text || payload.ai_response,
                    });
                    if (statusEl) statusEl.textContent = "Da mo chia se de gui cho bac si.";
                    return;
                }

                if (navigator.clipboard?.writeText) {
                    await navigator.clipboard.writeText(payload.share_text || payload.ai_response);
                    if (statusEl) statusEl.textContent = "Da sao chep noi dung de chia se voi bac si.";
                    return;
                }

                if (statusEl) statusEl.textContent = "Trinh duyet hien tai chua ho tro chia se.";
            } catch (err) {
                if (err?.name === "AbortError") {
                    if (statusEl) statusEl.textContent = "";
                    return;
                }
                if (statusEl) statusEl.textContent = err.message || "Khong the luu noi dung nay.";
            }
        }

        async function reportIncorrectResponse(feedbackId, button) {
            const payload = feedbackStore.get(feedbackId);
            if (!payload) return;

            const actionWrap = button.closest(".msg-actions");
            const statusEl = actionWrap?.querySelector(".feedback-status");
            const buttons = actionWrap ? Array.from(actionWrap.querySelectorAll(".feedback-btn")) : [];

            buttons.forEach((btn) => { btn.disabled = true; });
            if (statusEl) statusEl.textContent = "Dang dua vao review queue...";

            try {
                const result = await postFeedback(payload, "negative", {
                    needs_review: true,
                    feedback_reason: "user_reported_incorrect_explanation",
                    flow_state: "failure",
                });

                buttons.forEach((btn) => { btn.classList.remove("active"); });
                if (button) button.classList.add("active");

                if (statusEl) {
                    statusEl.textContent = result.queued_for_review
                        ? "Da danh dau giai thich nay la khong dung. Ca nay da vao review queue."
                        : "Da ghi nhan bao loi.";
                }
            } catch (err) {
                if (statusEl) statusEl.textContent = err.message || "Bao loi that bai";
            } finally {
                buttons.forEach((btn) => { btn.disabled = false; });
            }
        }

        function scrollBottom() {
            const c = document.getElementById("chatContainer");
            requestAnimationFrame(() => { c.scrollTop = c.scrollHeight; });
        }

        // ── Sidebar: welcome state ────────────────────
        function showSidebarWelcome() {
            document.getElementById("sidebarInner").innerHTML = `
                <div class="sidebar-brand">
                    <div class="brand-icon">🏥</div>
                    <div>
                        <div class="brand-name">VinBiocare AI</div>

                <div>
                    <div class="sidebar-section-label">Tính năng</div>
                    <div class="feature-list">
                        <div class="feature-item">
                            <span class="feature-item-icon">🔬</span>
                            <div class="feature-item-text">
                                <strong>Phân tích rule-based</strong>
                                <span>Đánh giá 10 chỉ số theo ngưỡng lâm sàng</span>
                            </div>
                        </div>
                        <div class="feature-item">
                            <span class="feature-item-icon">💬</span>

                                <strong>Giải thích AI</strong>
                                <span>Ngôn ngữ tự nhiên, dễ hiểu bằng tiếng Việt</span>

                                <strong>Cảnh báo nguy hiểm</strong>
                                <span>Phát hiện giá trị nguy hiểm và ưu tiên khám ngay</span>

                            <span class="feature-item-icon">📷</span>

                                <span>Upload ảnh phiếu kết quả, AI tự đọc chỉ số</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div>
                    <div class="sidebar-section-label">Kịch bản demo</div>

                        <button class="scenario-chip" onclick="loadScenario('mixed')">Hỗn hợp</button>
                    </div>
                </div>`;
        }

        // Chat panel: empty state
        function showChatEmpty() {
            const c = document.getElementById("chatContainer");
            c.innerHTML = `
                <div class="chat-empty">
                    <div class="chat-empty-inner">
                        <span class="chat-empty-icon">💬</span>
                        <div class="chat-empty-title">Bắt đầu phân tích</div>
                        <div class="chat-empty-sub">Nhập chỉ số xét nghiệm, upload ảnh phiếu kết quả,
                        hoặc chọn kịch bản demo từ panel bên trái.</div>
                    </div>
                </div>`;
        }

        window.addEventListener("DOMContentLoaded", () => {
            showSidebarWelcome();
            showChatEmpty();
        });

        // ── Scenario / key handlers ───────────────────
        function loadScenario(name) {
            document.getElementById("userInput").value = SCENARIOS[name];
            document.getElementById("userInput").focus();
        }

        function handleKey(e) {
            if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 100) + 'px';
        }

        function sendQuick(text) {
            document.getElementById("userInput").value = text;
            sendMessage();
        }

        // ── Parse indicators ──────────────────────────
        const KNOWN_INDICATORS = [
            "Glucose", "Insulin", "BMI",
            "BP_Systolic", "BP_Diastolic",
            "LDL", "HDL", "Creatinine",
            "SkinThickness", "DiabetesPedigreeFunction"
        ];

        function looksLikeIndicatorInput(text) {
            if (!text) return false;
            if (/[:=]/.test(text) || /^\s*[\[{]/.test(text)) return true;

            const lowered = text.toLowerCase();
            return KNOWN_INDICATORS.some((name) => lowered.includes(name.toLowerCase()));
        }

        function formatValidationError(err) {
            if (typeof err === "string") {
                const cleaned = err
                    .replace(/^Dữ liệu đầu vào không hợp lệ:\s*/i, "")
                    .replace(/^Input không hợp lệ:\s*/i, "");
                const parts = cleaned.split(/\s*;\s*/).filter(Boolean);
                if (!parts.length) return cleaned || "Input không hợp lệ.";
                return "Input chưa hợp lệ:\n" + parts.map((part) => `- ${part}`).join("\n");
            }

            if (Array.isArray(err)) {
                const items = err.map((item) => {
                    const loc = Array.isArray(item.loc)
                        ? item.loc.filter((segment) => segment !== "body").join(".")
                        : "";
                    return loc ? `- Trường \`${loc}\`: ${item.msg}` : `- ${item.msg}`;
                });
                return "Input chưa hợp lệ:\n" + items.join("\n");
            }

            return "Input không hợp lệ. Vui lòng kiểm tra lại các trường đã nhập.";
        }

        async function parseErrorResponse(response, fallbackMessage) {
            try {
                const payload = await response.json();
                if (payload && "detail" in payload) {
                    return formatValidationError(payload.detail);
                }
                return fallbackMessage;
            } catch {
                return fallbackMessage;
            }
        }

        function parseIndicators(text) {
            const indicators = {};

            try {
                const parsed = JSON.parse(text);
                if (typeof parsed === "object" && !Array.isArray(parsed)) {
                    for (const [k, v] of Object.entries(parsed)) {
                        if (typeof v === "number") indicators[k] = v;
                    }
                    if (Object.keys(indicators).length > 0) return indicators;
                }
            } catch {}

            const strictPattern = /(\w+)\s*[:=]\s*(-?[\d.]+)/g;
            let match;
            while ((match = strictPattern.exec(text)) !== null) {
                indicators[match[1]] = parseFloat(match[2]);
            }

            for (const name of KNOWN_INDICATORS) {
                if (name in indicators) continue;
                const loose = new RegExp(
                    "\\b" + name + "\\b\\s*[:=]?\\s*(-?[\\d]+(?:\\.[\\d]+)?)", "i"
                );
                const m = text.match(loose);
                if (m) indicators[name] = parseFloat(m[1]);
            }

            return Object.keys(indicators).length > 0 ? indicators : null;
        }

        // ── Image upload handling ─────────────────────
        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                alert('Vui lòng chọn file hình ảnh.');
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                alert('File quá lớn. Vui lòng chọn file dưới 10MB.');
                return;
            }
            selectedImageFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('imagePreviewThumb').src = e.target.result;
                document.getElementById('imagePreviewName').textContent = file.name;
                document.getElementById('imagePreviewBar').style.display = 'flex';
            };
            reader.readAsDataURL(file);
        }

        function removeImagePreview() {
            selectedImageFile = null;
            document.getElementById('imageInput').value = '';
            document.getElementById('imagePreviewBar').style.display = 'none';
        }

        // ── Send message ──────────────────────────────
        async function sendMessage() {
            const input = document.getElementById("userInput");
            const text  = input.value.trim();
            const sendBtn = document.getElementById("sendBtn");

            // ── OCR image flow ───────────────────────
            if (selectedImageFile) {
                const imageFile = selectedImageFile;
                const fileName  = imageFile.name;
                removeImagePreview();

                const empty = document.querySelector(".chat-empty");
                if (empty) empty.remove();

                input.value = "";
                input.style.height = 'auto';
                addUserMessage("📷 " + fileName + (text ? "\n" + text : ""));

                sendBtn.disabled = true;
                showTyping();

                try {
                    const formData = new FormData();
                    formData.append("image", imageFile);

                    const ocrResp = await fetch("/api/ocr", {
                        method: "POST",
                        body: formData,
                    });

                    if (!ocrResp.ok) {
                        const err = await ocrResp.json();
                        throw new Error(err.detail || "Không đọc được chỉ số từ ảnh");
                    }

                    const ocrData = await ocrResp.json();
                    lastRuleOutput = ocrData.rule_output;
                    showRuleCard(lastRuleOutput);

                    const extractedText = Object.entries(ocrData.extracted_indicators)
                        .map(([k, v]) => `${k}: ${v}`)
                        .join(", ");
                    const userMsg = `Tôi vừa upload ảnh xét nghiệm. Các chỉ số đọc được: ${extractedText}`;
                    conversationHistory.push({ role: "user", content: userMsg });

                    const chatResp = await fetch("/api/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            messages: conversationHistory,
                            context: { rule_output: lastRuleOutput },
                        }),
                    });
                    const chatData = await chatResp.json();
                    removeTyping();

                    if (chatData.reply) {
                        addBotMessage(chatData.reply, buildFeedbackPayload(userMsg, chatData.reply, lastRuleOutput));
                        conversationHistory.push({ role: "assistant", content: chatData.reply });
                    }

                    if (!hasAnalyzed) {
                        hasAnalyzed = true;
                        input.placeholder = "Đặt câu hỏi về kết quả xét nghiệm...";
                    }
                    document.getElementById("quickActions").classList.add("visible");

                } catch (err) {
                    removeTyping();
                    addBotMessage("Xin lỗi, không thể đọc chỉ số từ ảnh. Vui lòng thử lại hoặc nhập thủ công.\n(`" + err.message + "`)");
                } finally {
                    sendBtn.disabled = false;
                    input.focus();
                }
                return;
            }

            // ── Text flow (existing) ─────────────────
            if (!text) return;

            // Clear empty state on first message
            const empty = document.querySelector(".chat-empty");
            if (empty) empty.remove();

            input.value = "";
            input.style.height = 'auto';
            addUserMessage(text);

            sendBtn.disabled = true;

            const indicators = parseIndicators(text);
            const attemptedIndicatorInput = looksLikeIndicatorInput(text);

            try {
                if (indicators) {
                    const analyzeResp = await fetch("/api/analyze", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ indicators })
                    });
                    if (!analyzeResp.ok) {
                        throw new Error(await parseErrorResponse(analyzeResp, "Input không hợp lệ."));
                    }
                    lastRuleOutput = await analyzeResp.json();

                    // Results go to sidebar
                    showRuleCard(lastRuleOutput);

                    conversationHistory.push({ role: "user", content: text });
                    showTyping();

                    const chatResp = await fetch("/api/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            messages: conversationHistory,
                            context: { rule_output: lastRuleOutput }
                        })
                    });
                    const chatData = await chatResp.json();
                    removeTyping();

                    if (chatData.reply) {
                        addBotMessage(chatData.reply, buildFeedbackPayload(text, chatData.reply, lastRuleOutput));
                        conversationHistory.push({ role: "assistant", content: chatData.reply });
                    }

                    if (!hasAnalyzed) {
                        hasAnalyzed = true;
                        input.placeholder = "Đặt câu hỏi về kết quả xét nghiệm...";
                    }

                    document.getElementById("quickActions").classList.add("visible");

                } else {
                    if (attemptedIndicatorInput) {
                        throw new Error(
                            "Input chưa hợp lệ:\n- Không đọc được chỉ số xét nghiệm từ nội dung bạn nhập\n- Vui lòng kiểm tra đúng tên chỉ số và giá trị số"
                        );
                    }

                    conversationHistory.push({ role: "user", content: text });
                    showTyping();

                    const chatResp = await fetch("/api/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            messages: conversationHistory,
                            context: lastRuleOutput ? { rule_output: lastRuleOutput } : null
                        })
                    });
                    const chatData = await chatResp.json();
                    removeTyping();

                    if (chatData.reply) {
                        addBotMessage(chatData.reply, buildFeedbackPayload(text, chatData.reply, lastRuleOutput));
                        conversationHistory.push({ role: "assistant", content: chatData.reply });
                    }
                }
            } catch (err) {
                removeTyping();
                addBotMessage(err.message || "Input không hợp lệ. Vui lòng kiểm tra lại.");
            } finally {
                sendBtn.disabled = false;
                input.focus();
            }
        }

        // ── Message rendering ─────────────────────────
        function addUserMessage(text) {
            const c   = document.getElementById("chatContainer");
            const row = document.createElement("div");
            row.className = "msg-row user";
            row.innerHTML = `
                <div class="msg-content">
                    <div class="bubble">${escapeHtml(text)}</div>
                    <span class="msg-time">${nowHHMM()}</span>
                </div>`;
            c.appendChild(row);
            scrollBottom();
        }

        function addBotMessage(text, feedbackPayload = null) {
            const c   = document.getElementById("chatContainer");
            const row = document.createElement("div");
            row.className = "msg-row bot";
            let actionsHtml = "";
            let stateHtml = "";

            if (feedbackPayload) {
                const feedbackId = `fb-${++feedbackCounter}`;
                feedbackStore.set(feedbackId, feedbackPayload);
                stateHtml = renderResponseState(feedbackId, feedbackPayload);
                actionsHtml = `
                    <div class="msg-actions">
                        <button class="feedback-btn" onclick="submitFeedback('${feedbackId}', 'positive', this)" aria-label="Like" title="Like">👍</button>
                        <button class="feedback-btn" onclick="submitFeedback('${feedbackId}', 'negative', this)" aria-label="Dislike" title="Dislike">👎</button>
                        <button class="feedback-btn report" onclick="reportIncorrectResponse('${feedbackId}', this)">Giai thich nay khong dung</button>
                        <span class="feedback-status"></span>
                    </div>`;
            }

            row.innerHTML = `
                <div class="msg-avatar-wrap">
                    <div class="msg-avatar">AI</div>
                </div>
                <div class="msg-content">
                    <div class="bubble">${renderMarkdown(text)}</div>
                    <span class="msg-time">${nowHHMM()}</span>
                    <div class="msg-tools">
                        ${stateHtml}
                        ${actionsHtml}
                    </div>
                </div>`;
            c.appendChild(row);
            scrollBottom();
        }

        function showTyping() {
            const c   = document.getElementById("chatContainer");
            const row = document.createElement("div");
            row.className = "msg-row bot";
            row.id        = "typingRow";
            row.innerHTML = `
                <div class="msg-avatar-wrap">
                    <div class="msg-avatar">AI</div>
                </div>
                <div class="msg-content">
                    <div class="bubble typing">Đang phân tích...</div>
                </div>`;
            c.appendChild(row);
            scrollBottom();
        }

        function removeTyping() {
            const el = document.getElementById("typingRow");
            if (el) el.remove();
        }

        // ── Progress bar ──────────────────────────────
        function buildProgressBar(ind) {
            const refStr   = ind.reference || '';
            const refMatch = refStr.match(/([\d.]+)\s*[–\-]\s*([\d.]+)/);
            if (!refMatch) return '';

            const normalMin = parseFloat(refMatch[1]);
            const normalMax = parseFloat(refMatch[2]);
            const value     = ind.value;
            const span      = (normalMax - normalMin) || 1;
            const lo        = normalMin - span * 0.5;
            const hi        = normalMax + span * 0.5;
            const range     = hi - lo;

            const normLeft  = ((normalMin - lo) / range * 100).toFixed(1);
            const normWidth = ((normalMax - normalMin) / range * 100).toFixed(1);
            const valPct    = Math.min(100, Math.max(0, (value - lo) / range * 100)).toFixed(1);

            return `
                <div class="progress-track">
                    <div class="progress-normal-zone"
                         style="left:${normLeft}%;width:${normWidth}%"></div>
                    <div class="progress-marker ${ind.color}"
                         style="left:${valPct}%"></div>
                </div>`;
        }

        // ── Rule card → renders into sidebar ─────────
        function showRuleCard(ruleOutput) {
            const sidebar = document.getElementById("sidebarInner");
            sidebar.innerHTML = ''; // clear welcome

            if (typeof ruleOutput.confidence_overall === "number") {
                const confidenceBanner = document.createElement("div");
                const confidenceClass = ruleOutput.low_confidence ? "low" : "high";
                const confidenceText = formatConfidence(ruleOutput.confidence_overall);
                confidenceBanner.className = `confidence-banner ${confidenceClass}`;
                confidenceBanner.textContent = ruleOutput.low_confidence
                    ? `Do chac chan hien tai o muc ${confidenceText || "thap"}. Nen xac nhan them voi bac si truoc khi dua ra quyet dinh.`
                    : `Do chac chan phan tich dat ${confidenceText || "tot"}. Ban co the dung ket qua nay de trao doi tiep voi bac si.`;
                sidebar.appendChild(confidenceBanner);
            }

            // Triage banner at top of sidebar
            if (ruleOutput.triage === "urgent" || ruleOutput.triage === "monitor") {
                const banner = document.createElement("div");
                if (ruleOutput.triage === "urgent") {
                    const names = (ruleOutput.critical_indicators || []).join(", ");
                    banner.innerHTML = `
                        <div class="triage-banner urgent">
                            <span class="triage-icon">⚠️</span>
                            <span>Chỉ số <strong>NGUY HIỂM</strong>${names ? ': ' + escapeHtml(names) : ''}.
                            Cần khám chuyên khoa ngay.</span>
                        </div>`;
                } else {
                    banner.innerHTML = `
                        <div class="triage-banner monitor">
                            <span class="triage-icon">⚡</span>
                            <span>Một số chỉ số cần theo dõi. Nên tái khám sớm.</span>
                        </div>`;
                }
                sidebar.appendChild(banner);
            }

            // Indicator card
            const card  = document.createElement("div");
            card.className = "rule-card";

            const order  = ["red", "yellow", "green", "gray"];
            const labels = { red: "Nguy hiểm", yellow: "Cảnh báo",
                             green: "Bình thường", gray: "Chưa xác định" };
            const groups = {};
            for (const c of order) groups[c] = ruleOutput.indicators.filter(i => i.color === c);

            let html = '<div class="rule-card-title">Kết quả phân tích</div>';

            for (const color of order) {
                const inds = groups[color];
                if (!inds.length) continue;
                if (color !== "green") {
                    html += `<div class="ind-group-label ${color}">${labels[color]}</div>`;
                }
                for (const ind of inds) {
                    html += `
                        <div class="indicator-row ${ind.color}">
                            <div class="ind-header">
                                <div class="ind-dot ${ind.color}"></div>
                                <span class="ind-name">${escapeHtml(ind.name)}</span>
                                <div class="ind-val-wrap">
                                    <div class="ind-val">${ind.value}${ind.unit ? ' ' + ind.unit : ''}</div>
                                    ${ind.reference
                                        ? `<div class="ind-ref">Tham chiếu: ${escapeHtml(ind.reference)}</div>`
                                        : ''}
                                    ${typeof ind.confidence === "number"
                                        ? `<div class="ind-ref">Do tin cay: ${escapeHtml(formatConfidence(ind.confidence))}</div>`
                                        : ''}
                                </div>
                                <span class="ind-status ${ind.color}">${escapeHtml(ind.status)}</span>
                            </div>
                            ${buildProgressBar(ind)}
                        </div>`;
                }
            }

            if (ruleOutput.triage === "urgent") {
                html += `<div class="vinmec-cta">🏥 Đặt lịch khám tại Vinmec ngay</div>`;
            }

            card.innerHTML = html;
            sidebar.appendChild(card);

            // Re-add scenarios at bottom of sidebar
            const scenarioBlock = document.createElement("div");
            scenarioBlock.innerHTML = `
                <div class="sidebar-section-label" style="margin-top:4px">Kịch bản khác</div>
                <div class="scenario-chips">
                    <button class="scenario-chip" onclick="loadScenario('cardiac')">Tim mạch</button>
                    <button class="scenario-chip" onclick="loadScenario('diabetes')">Tiểu đường</button>
                    <button class="scenario-chip" onclick="loadScenario('kidney')">Thận</button>
                    <button class="scenario-chip" onclick="loadScenario('normal')">Bình thường</button>
                    <button class="scenario-chip" onclick="loadScenario('mixed')">Hỗn hợp</button>
                </div>`;
            sidebar.appendChild(scenarioBlock);
        }
    </script>
</body>
