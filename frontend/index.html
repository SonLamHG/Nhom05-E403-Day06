<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VinBiocare AI – Chatbot Sức khỏe</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* ── DESIGN TOKENS ───────────────────────────── */
        :root {
            --primary:      #0f2d4e;
            --primary-mid:  #1a4a7a;
            --accent:       #0ea5e9;
            --accent-dark:  #0369a1;
            --accent-bg:    #e0f2fe;
            --success:      #059669;
            --success-bg:   #d1fae5;
            --warning:      #d97706;
            --warning-bg:   #fef3c7;
            --danger:       #dc2626;
            --danger-bg:    #fee2e2;
            --bg:           #f1f5f9;
            --surface:      #ffffff;
            --surface-2:    #f8fafc;
            --border:       #e2e8f0;
            --border-mid:   #cbd5e1;
            --text:         #0f172a;
            --text-2:       #475569;
            --text-3:       #94a3b8;
            --sidebar-w:    340px;
            --r-sm:         8px;
            --r:            12px;
            --sh-sm:        0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --sh:           0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
            --sh-lg:        0 10px 30px rgba(0,0,0,0.10), 0 4px 10px rgba(0,0,0,0.06);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: 'Be Vietnam Pro', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            height: 100%;
            overflow: hidden;
            color: var(--text);
            font-size: 15px;
            line-height: 1.6;
            font-weight: 500;
            -webkit-font-smoothing: antialiased;
        }

        /* ── DESKTOP LAYOUT ──────────────────────────── */
        .layout {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        /* HEADER — full width */
        .header {
            background: var(--primary);
            color: white;
            padding: 0 28px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
            z-index: 10;
        }

        .header::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        .header-avatar-wrap { position: relative; }

        .header-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.22);
            display: block;
        }

        .header-avatar-fallback {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 1.05em;
            border: 2px solid rgba(255,255,255,0.22);
        }

        .online-dot {
            position: absolute;
            bottom: 1px; right: 1px;
            width: 9px; height: 9px;
            background: #22c55e;
            border-radius: 50%;
            border: 2px solid var(--primary);
            animation: pulse-ring 2.5s ease-in-out infinite;
        }

        @keyframes pulse-ring {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.45); }
            50%       { box-shadow: 0 0 0 5px rgba(34,197,94,0); }
        }

        .header-title {
            font-size: 1.05em;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .header-tagline {
            font-size: 0.72em;
            opacity: 0.60;
            font-weight: 400;
            margin-top: 1px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        .online-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(34,197,94,0.15);
            color: #86efac;
            border: 1px solid rgba(34,197,94,0.25);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.72em;
            font-weight: 700;
        }

        .online-badge::before {
            content: '';
            width: 6px; height: 6px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }

        .header-disclaimer {
            font-size: 0.68em;
            opacity: 0.45;
            font-weight: 400;
        }

        /* MAIN CONTENT — two columns */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── SIDEBAR ─────────────────────────────────── */
        .sidebar {
            width: var(--sidebar-w);
            flex-shrink: 0;
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar::-webkit-scrollbar { width: 3px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 3px; }

        .sidebar-inner {
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            flex: 1;
        }

        /* Welcome state in sidebar */
        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }

        .brand-icon {
            width: 42px; height: 42px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary), var(--primary-mid));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            flex-shrink: 0;
        }

        .brand-name {
            font-size: 0.95em;
            font-weight: 700;
            color: var(--primary);
        }

        .brand-sub {
            font-size: 0.72em;
            color: var(--text-3);
            font-weight: 400;
            margin-top: 1px;
        }

        .sidebar-section-label {
            font-size: 0.67em;
            font-weight: 700;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.09em;
            margin-bottom: 8px;
        }

        .feature-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .feature-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 12px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
        }

        .feature-item-icon {
            font-size: 1.2em;
            flex-shrink: 0;
            line-height: 1;
            margin-top: 1px;
        }

        .feature-item-text strong {
            display: block;
            font-size: 0.82em;
            font-weight: 700;
            color: var(--text);
            line-height: 1.3;
        }

        .feature-item-text span {
            font-size: 0.74em;
            color: var(--text-3);
            font-weight: 400;
        }

        /* Demo scenarios in sidebar */
        .scenario-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .scenario-chip {
            padding: 4px 12px;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.74em;
            font-weight: 600;
            color: var(--text-2);
            font-family: inherit;
            transition: all 0.15s;
        }

        .scenario-chip:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* ── TRIAGE BANNER (in sidebar) ──────────────── */
        .triage-banner {
            display: flex;
            align-items: flex-start;
            gap: 9px;
            border-radius: var(--r-sm);
            padding: 10px 13px;
            font-size: 0.82em;
            font-weight: 600;
            line-height: 1.45;
            animation: fadeUp 0.25s ease both;
        }

        .triage-banner.urgent {
            background: var(--danger-bg);
            border: 1.5px solid #fca5a5;
            border-left: 4px solid var(--danger);
            color: #991b1b;
        }

        .triage-banner.monitor {
            background: var(--warning-bg);
            border: 1.5px solid #fcd34d;
            border-left: 4px solid var(--warning);
            color: #92400e;
        }

        .triage-icon { font-size: 1.1em; flex-shrink: 0; margin-top: 1px; }

        /* ── RULE CARD (in sidebar) ──────────────────── */
        .rule-card { animation: fadeUp 0.28s ease both; }

        .rule-card-title {
            font-size: 0.67em;
            font-weight: 700;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.09em;
            margin-bottom: 10px;
        }

        .ind-group-label {
            font-size: 0.65em;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 4px 0 5px;
            margin-top: 2px;
        }
        .ind-group-label.red    { color: var(--danger); }
        .ind-group-label.yellow { color: var(--warning); }
        .ind-group-label.green  { color: var(--success); }
        .ind-group-label.gray   { color: var(--text-3); }

        .indicator-row {
            padding: 8px 10px;
            border-radius: var(--r-sm);
            margin-bottom: 6px;
        }
        .indicator-row.green  { background: var(--success-bg); }
        .indicator-row.yellow { background: var(--warning-bg); }
        .indicator-row.red    { background: var(--danger-bg); }
        .indicator-row.gray   { background: var(--surface-2); }

        .ind-header {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-bottom: 6px;
        }

        .ind-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .ind-dot.green  { background: var(--success); }
        .ind-dot.yellow { background: var(--warning); }
        .ind-dot.red    { background: var(--danger); }
        .ind-dot.gray   { background: var(--text-3); }

        .ind-name { flex: 1; font-weight: 600; font-size: 0.84em; color: var(--text); }

        .ind-val-wrap { text-align: right; }
        .ind-val { font-weight: 700; font-size: 0.88em; white-space: nowrap; }
        .ind-ref { font-size: 0.65em; color: var(--text-3); font-weight: 400; white-space: nowrap; }

        .ind-status {
            font-size: 0.66em;
            padding: 2px 7px;
            border-radius: 20px;
            color: white;
            font-weight: 700;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .ind-status.green  { background: var(--success); }
        .ind-status.yellow { background: var(--warning); }
        .ind-status.red    { background: var(--danger); }
        .ind-status.gray   { background: var(--text-3); }

        /* Progress bar */
        .progress-track {
            position: relative;
            height: 4px;
            background: rgba(0,0,0,0.07);
            border-radius: 10px;
            overflow: visible;
        }

        .progress-normal-zone {
            position: absolute;
            top: 0; height: 100%;
            background: rgba(5,150,105,0.25);
            border-radius: 10px;
        }

        .progress-marker {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 10px; height: 10px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 1px 4px rgba(0,0,0,0.22);
            z-index: 2;
        }
        .progress-marker.green  { background: var(--success); }
        .progress-marker.yellow { background: var(--warning); }
        .progress-marker.red    { background: var(--danger); }
        .progress-marker.gray   { background: var(--text-3); }

        .vinmec-cta {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--success), #047857);
            color: white;
            padding: 10px 13px;
            border-radius: var(--r-sm);
            margin-top: 8px;
            font-size: 0.8em;
            font-weight: 700;
            cursor: pointer;
        }

        /* ── CHAT PANEL ──────────────────────────────── */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 4px; }

        /* Empty state in chat */
        .chat-empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-3);
            font-size: 0.88em;
            text-align: center;
            padding: 40px;
            animation: fadeUp 0.4s ease both;
        }

        .chat-empty-inner { max-width: 320px; }
        .chat-empty-icon { font-size: 2.5em; display: block; margin-bottom: 12px; }
        .chat-empty-title { font-weight: 700; color: var(--text-2); margin-bottom: 6px; font-size: 1.05em; }
        .chat-empty-sub { font-size: 0.92em; line-height: 1.6; }

        /* ── MESSAGE ROWS ────────────────────────────── */
        .msg-row {
            display: flex;
            gap: 10px;
            max-width: 780px;
            width: 100%;
            animation: fadeUp 0.22s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .msg-row.user {
            align-self: flex-end;
            flex-direction: row-reverse;
            max-width: 620px;
        }
        .msg-row.bot { align-self: flex-start; }

        .msg-avatar-wrap { flex-shrink: 0; padding-top: 2px; }

        .msg-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65em;
            font-weight: 800;
            color: white;
            box-shadow: var(--sh-sm);
        }

        .msg-row.user .msg-avatar-wrap { display: none; }

        .msg-content { display: flex; flex-direction: column; gap: 3px; }
        .msg-row.user .msg-content { align-items: flex-end; }

        .msg-time {
            font-size: 0.62em;
            color: var(--text-3);
            font-weight: 400;
            padding: 0 4px;
        }

        /* ── BUBBLES ─────────────────────────────────── */
        .bubble {
            padding: 11px 16px;
            border-radius: 16px;
            line-height: 1.65;
            font-size: 0.92em;
            font-weight: 500;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .msg-row.user .bubble {
            background: linear-gradient(135deg, var(--primary), var(--primary-mid));
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: var(--sh);
        }

        .msg-row.bot .bubble {
            background: var(--surface);
            color: var(--text);
            border-bottom-left-radius: 4px;
            box-shadow: var(--sh);
        }

        .bubble.typing { color: var(--text-3); font-style: italic; font-weight: 400; }

        .bubble strong, .bubble b { font-weight: 700; color: var(--primary); }
        .bubble em, .bubble i { font-style: italic; }
        .bubble ul, .bubble ol { margin: 6px 0 2px; padding: 0; list-style: none; }
        .bubble li {
            padding: 5px 11px;
            margin-bottom: 4px;
            background: var(--surface-2);
            border-left: 3px solid var(--accent);
            border-radius: 0 6px 6px 0;
            font-size: 0.93em;
            line-height: 1.5;
        }
        .bubble p { margin-bottom: 5px; }
        .bubble p:last-child { margin-bottom: 0; }
        .bubble code {
            background: var(--accent-bg);
            color: var(--accent-dark);
            padding: 1px 5px;
            border-radius: 4px;
            font-size: 0.86em;
            font-family: 'SF Mono', Monaco, monospace;
        }
        .bubble ol { counter-reset: step; }
        .bubble ol li { counter-increment: step; border-left-color: var(--success); }
        .bubble ol li::before {
            content: counter(step);
            background: var(--success);
            color: white;
            font-size: 0.68em;
            font-weight: 700;
            width: 15px; height: 15px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 6px;
            vertical-align: middle;
        }
        .bubble .hl-danger  { color: var(--danger);  font-weight: 700; }
        .bubble .hl-warning { color: var(--warning); font-weight: 700; }
        .bubble .hl-safe    { color: var(--success); font-weight: 700; }
        .bubble .hl-info    { color: var(--accent);  font-weight: 600; }
        .bubble hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }

        /* ── QUICK ACTIONS ───────────────────────────── */
        .quick-actions {
            display: none;
            gap: 7px;
            padding: 8px 28px;
            flex-wrap: wrap;
            background: var(--bg);
            flex-shrink: 0;
        }

        .quick-actions.visible {
            display: flex;
            animation: slideUp 0.3s ease both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .quick-btn {
            padding: 5px 14px;
            border: 1.5px solid var(--accent);
            background: white;
            color: var(--accent);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.78em;
            font-weight: 700;
            font-family: inherit;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .quick-btn:hover { background: var(--accent); color: white; }

        /* ── INPUT AREA ──────────────────────────────── */
        .input-area {
            display: flex;
            gap: 10px;
            padding: 12px 28px 14px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            align-items: flex-end;
        }

        .input-area textarea {
            flex: 1;
            padding: 10px 18px;
            border: 1.5px solid var(--border);
            border-radius: 24px;
            font-size: 0.92em;
            font-family: inherit;
            font-weight: 500;
            resize: none;
            outline: none;
            max-height: 100px;
            min-height: 42px;
            line-height: 1.5;
            background: var(--bg);
            color: var(--text);
            transition: border-color 0.15s, background 0.15s;
        }

        .input-area textarea:focus { border-color: var(--accent); background: white; }
        .input-area textarea::placeholder { color: var(--text-3); }

        .send-btn {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 2px 8px rgba(14,165,233,0.38);
        }

        .send-btn:hover { transform: scale(1.07); box-shadow: 0 4px 14px rgba(14,165,233,0.5); }
        .send-btn:disabled { opacity: 0.42; cursor: not-allowed; transform: none; box-shadow: none; }
        .send-btn svg { width: 16px; height: 16px; }

        .input-hint {
            font-size: 0.68em;
            color: var(--text-3);
            padding: 4px 28px 8px;
            background: var(--surface);
            font-weight: 400;
        }

        /* ── MOBILE FALLBACK (< 768px) ───────────────── */
        @media (max-width: 767px) {
            .sidebar { display: none; }
            .chat-container { padding: 14px 12px 8px; }
            .quick-actions { padding: 7px 12px; }
            .input-area { padding: 10px 12px 12px; }
            .input-hint { padding: 3px 12px 6px; }
            .header { padding: 0 16px; }
            .header-disclaimer { display: none; }
            .msg-row { max-width: 92%; }
            .msg-row.user { max-width: 82%; }
        }
    </style>
</head>
<body>
    <div class="layout">

        <!-- HEADER — full width -->
        <header class="header">
            <div class="header-left">
                <div class="header-avatar-wrap">
                    <img src="/static/logo.png" alt="VinBiocare" class="header-avatar"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                    <div class="header-avatar-fallback">🏥</div>
                    <div class="online-dot"></div>
                </div>
                <div>
                    <div class="header-title">VinBiocare AI</div>
                    <div class="header-tagline">Trợ lý phân tích chỉ số xét nghiệm</div>
                </div>
            </div>
            <div class="header-right">
                <span class="online-badge">Đang hoạt động</span>
                <span class="header-disclaimer">Không thay thế chẩn đoán y khoa</span>
            </div>
        </header>

        <!-- MAIN: sidebar + chat -->
        <div class="main">

            <!-- LEFT CHAT PANEL -->
            <div class="chat-panel">
                <div class="chat-container" id="chatContainer">
                    <!-- Filled by JS -->
                </div>

                <div class="quick-actions" id="quickActions">
                    <button class="quick-btn" onclick="sendQuick('Phân tích chi tiết các chỉ số')">Phân tích chi tiết</button>
                    <button class="quick-btn" onclick="sendQuick('Giải thích từng chỉ số bất thường')">Giải thích chỉ số</button>
                    <button class="quick-btn" onclick="sendQuick('Tôi cần làm gì tiếp theo?')">Bước tiếp theo</button>
                    <button class="quick-btn" onclick="sendQuick('Chế độ ăn uống phù hợp với tôi là gì?')">Chế độ ăn</button>
                </div>

                <div class="input-area">
                    <textarea id="userInput" rows="1"
                              placeholder="Nhập chỉ số xét nghiệm (VD: LDL:160 HDL:35) hoặc đặt câu hỏi..."
                              onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="Gửi">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
                <div class="input-hint">Enter để gửi &nbsp;·&nbsp; Shift+Enter xuống dòng</div>
            </div>

            <!-- RIGHT SIDEBAR -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-inner" id="sidebarInner">
                    <!-- Filled by JS -->
                </div>
            </aside>
        </div>
    </div>

    <script>
        const SCENARIOS = {
            cardiac:  "LDL:165 HDL:32 BP_Systolic:135 BP_Diastolic:88",
            diabetes: "Glucose:155 Insulin:1.2 BMI:33.6 SkinThickness:35 DiabetesPedigreeFunction:0.627",
            kidney:   "Creatinine:2.1 BP_Systolic:148 BP_Diastolic:92",
            normal:   "Glucose:90 Insulin:12 BMI:22 BP_Systolic:115 BP_Diastolic:75 LDL:85 HDL:55",
            mixed:    "LDL:170 HDL:33 Glucose:148 BP_Systolic:142 BP_Diastolic:94 BMI:30.2 Insulin:0 SkinThickness:35"
        };

        let conversationHistory = [];
        let lastRuleOutput     = null;
        let hasAnalyzed        = false;

        // ── Markdown parser ──────────────────────────
        function renderMarkdown(text) {
            text = text.replace(/\r\n/g, '\n');
            const lines = text.split('\n');
            const blocks = [];
            let currentList = null;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const ulMatch = line.match(/^[\-\*]\s+(.+)$/);
                const olMatch = line.match(/^\d+\.\s+(.+)$/);

                if (ulMatch) {
                    if (!currentList || currentList.type !== 'ul') {
                        if (currentList) blocks.push(currentList);
                        currentList = { type: 'ul', items: [] };
                    }
                    currentList.items.push(ulMatch[1]);
                } else if (olMatch) {
                    if (!currentList || currentList.type !== 'ol') {
                        if (currentList) blocks.push(currentList);
                        currentList = { type: 'ol', items: [] };
                    }
                    currentList.items.push(olMatch[1]);
                } else {
                    if (currentList) { blocks.push(currentList); currentList = null; }
                    if (line.trim() === '') {
                        blocks.push({ type: 'break' });
                    } else {
                        const last = blocks[blocks.length - 1];
                        if (last && last.type === 'text') {
                            last.content += '\n' + line;
                        } else {
                            blocks.push({ type: 'text', content: line });
                        }
                    }
                }
            }
            if (currentList) blocks.push(currentList);

            let html = '';
            for (const block of blocks) {
                if (block.type === 'break') continue;
                else if (block.type === 'ul' || block.type === 'ol') {
                    const tag = block.type;
                    html += `<${tag}>` +
                        block.items.map(i => `<li>${inlineFormat(i)}</li>`).join('') +
                        `</${tag}>`;
                } else if (block.type === 'text') {
                    html += `<p>${inlineFormat(block.content)}</p>`;
                }
            }
            return html || '<p></p>';
        }

        function inlineFormat(text) {
            text = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/__(.+?)__/g, '<strong>$1</strong>');
            text = text.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
            text = text.replace(/(?<!_)_(?!_)(.+?)(?<!_)_(?!_)/g, '<em>$1</em>');
            text = text.replace(/`(.+?)`/g, '<code>$1</code>');
            text = text.replace(/\b(nguy hiểm|nguy cơ cao|mức cao|quá cao|rất cao|danger)\b/gi,
                '<span class="hl-danger">$1</span>');
            text = text.replace(/\b(cảnh báo|hơi cao|hơi thấp|chú ý|warning)\b/gi,
                '<span class="hl-warning">$1</span>');
            text = text.replace(/\b(bình thường|ổn định|an toàn|tốt|normal)\b/gi,
                '<span class="hl-safe">$1</span>');
            text = text.replace(/\n/g, '<br>');
            return text;
        }

        // ── Helpers ──────────────────────────────────
        function nowHHMM() {
            const d = new Date();
            return d.getHours().toString().padStart(2,'0') + ':' +
                   d.getMinutes().toString().padStart(2,'0');
        }

        function escapeHtml(text) {
            const d = document.createElement("div");
            d.textContent = text;
            return d.innerHTML;
        }

        function scrollBottom() {
            const c = document.getElementById("chatContainer");
            requestAnimationFrame(() => { c.scrollTop = c.scrollHeight; });
        }

        // ── Sidebar: welcome state ────────────────────
        function showSidebarWelcome() {
            document.getElementById("sidebarInner").innerHTML = `
                <div class="sidebar-brand">
                    <div class="brand-icon">🏥</div>
                    <div>
                        <div class="brand-name">VinBiocare AI</div>
                        <div class="brand-sub">Phân tích chỉ số xét nghiệm</div>
                    </div>
                </div>

                <div>
                    <div class="sidebar-section-label">Tính năng</div>
                    <div class="feature-list">
                        <div class="feature-item">
                            <span class="feature-item-icon">🔬</span>
                            <div class="feature-item-text">
                                <strong>Phân tích rule-based</strong>
                                <span>Đánh giá 10 chỉ số theo ngưỡng lâm sàng</span>
                            </div>
                        </div>
                        <div class="feature-item">
                            <span class="feature-item-icon">💬</span>
                            <div class="feature-item-text">
                                <strong>Giải thích AI</strong>
                                <span>Ngôn ngữ tự nhiên, dễ hiểu bằng tiếng Việt</span>
                            </div>
                        </div>
                        <div class="feature-item">
                            <span class="feature-item-icon">🚨</span>
                            <div class="feature-item-text">
                                <strong>Cảnh báo nguy hiểm</strong>
                                <span>Phát hiện giá trị nguy hiểm và ưu tiên khám ngay</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div>
                    <div class="sidebar-section-label">Kịch bản demo</div>
                    <div class="scenario-chips">
                        <button class="scenario-chip" onclick="loadScenario('cardiac')">Tim mạch</button>
                        <button class="scenario-chip" onclick="loadScenario('diabetes')">Tiểu đường</button>
                        <button class="scenario-chip" onclick="loadScenario('kidney')">Thận</button>
                        <button class="scenario-chip" onclick="loadScenario('normal')">Bình thường</button>
                        <button class="scenario-chip" onclick="loadScenario('mixed')">Hỗn hợp</button>
                    </div>
                </div>`;
        }

        // Chat panel: empty state
        function showChatEmpty() {
            const c = document.getElementById("chatContainer");
            c.innerHTML = `
                <div class="chat-empty">
                    <div class="chat-empty-inner">
                        <span class="chat-empty-icon">💬</span>
                        <div class="chat-empty-title">Bắt đầu phân tích</div>
                        <div class="chat-empty-sub">Nhập chỉ số xét nghiệm vào ô bên dưới
                        hoặc chọn kịch bản demo từ panel bên trái.</div>
                    </div>
                </div>`;
        }

        window.addEventListener("DOMContentLoaded", () => {
            showSidebarWelcome();
            showChatEmpty();
        });

        // ── Scenario / key handlers ───────────────────
        function loadScenario(name) {
            document.getElementById("userInput").value = SCENARIOS[name];
            document.getElementById("userInput").focus();
        }

        function handleKey(e) {
            if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 100) + 'px';
        }

        function sendQuick(text) {
            document.getElementById("userInput").value = text;
            sendMessage();
        }

        // ── Parse indicators ──────────────────────────
        const KNOWN_INDICATORS = [
            "Glucose", "Insulin", "BMI",
            "BP_Systolic", "BP_Diastolic",
            "LDL", "HDL", "Creatinine",
            "SkinThickness", "DiabetesPedigreeFunction"
        ];

        function parseIndicators(text) {
            const indicators = {};

            try {
                const parsed = JSON.parse(text);
                if (typeof parsed === "object" && !Array.isArray(parsed)) {
                    for (const [k, v] of Object.entries(parsed)) {
                        if (typeof v === "number") indicators[k] = v;
                    }
                    if (Object.keys(indicators).length > 0) return indicators;
                }
            } catch {}

            const strictPattern = /(\w+)\s*[:=]\s*([\d.]+)/g;
            let match;
            while ((match = strictPattern.exec(text)) !== null) {
                indicators[match[1]] = parseFloat(match[2]);
            }

            for (const name of KNOWN_INDICATORS) {
                if (name in indicators) continue;
                const loose = new RegExp(
                    "\\b" + name + "\\b\\s*[:=]?\\s*([\\d]+(?:\\.[\\d]+)?)", "i"
                );
                const m = text.match(loose);
                if (m) indicators[name] = parseFloat(m[1]);
            }

            return Object.keys(indicators).length > 0 ? indicators : null;
        }

        // ── Send message ──────────────────────────────
        async function sendMessage() {
            const input = document.getElementById("userInput");
            const text  = input.value.trim();
            if (!text) return;

            // Clear empty state on first message
            const empty = document.querySelector(".chat-empty");
            if (empty) empty.remove();

            input.value = "";
            input.style.height = 'auto';
            addUserMessage(text);

            const sendBtn = document.getElementById("sendBtn");
            sendBtn.disabled = true;

            const indicators = parseIndicators(text);

            try {
                if (indicators) {
                    const analyzeResp = await fetch("/api/analyze", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ indicators })
                    });
                    if (!analyzeResp.ok) {
                        const err = await analyzeResp.json();
                        throw new Error(err.detail || "Lỗi phân tích chỉ số");
                    }
                    lastRuleOutput = await analyzeResp.json();

                    // Results go to sidebar
                    showRuleCard(lastRuleOutput);

                    conversationHistory.push({ role: "user", content: text });
                    showTyping();

                    const chatResp = await fetch("/api/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            messages: conversationHistory,
                            context: { rule_output: lastRuleOutput }
                        })
                    });
                    const chatData = await chatResp.json();
                    removeTyping();

                    if (chatData.reply) {
                        addBotMessage(chatData.reply);
                        conversationHistory.push({ role: "assistant", content: chatData.reply });
                    }

                    if (!hasAnalyzed) {
                        hasAnalyzed = true;
                        input.placeholder = "Đặt câu hỏi về kết quả xét nghiệm...";
                    }

                    document.getElementById("quickActions").classList.add("visible");

                } else {
                    conversationHistory.push({ role: "user", content: text });
                    showTyping();

                    const chatResp = await fetch("/api/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            messages: conversationHistory,
                            context: lastRuleOutput ? { rule_output: lastRuleOutput } : null
                        })
                    });
                    const chatData = await chatResp.json();
                    removeTyping();

                    if (chatData.reply) {
                        addBotMessage(chatData.reply);
                        conversationHistory.push({ role: "assistant", content: chatData.reply });
                    }
                }
            } catch (err) {
                removeTyping();
                addBotMessage("Xin lỗi, đã xảy ra lỗi kết nối. Vui lòng thử lại.\n(`" + err.message + "`)");
            } finally {
                sendBtn.disabled = false;
                input.focus();
            }
        }

        // ── Message rendering ─────────────────────────
        function addUserMessage(text) {
            const c   = document.getElementById("chatContainer");
            const row = document.createElement("div");
            row.className = "msg-row user";
            row.innerHTML = `
                <div class="msg-content">
                    <div class="bubble">${escapeHtml(text)}</div>
                    <span class="msg-time">${nowHHMM()}</span>
                </div>`;
            c.appendChild(row);
            scrollBottom();
        }

        function addBotMessage(text) {
            const c   = document.getElementById("chatContainer");
            const row = document.createElement("div");
            row.className = "msg-row bot";
            row.innerHTML = `
                <div class="msg-avatar-wrap">
                    <div class="msg-avatar">AI</div>
                </div>
                <div class="msg-content">
                    <div class="bubble">${renderMarkdown(text)}</div>
                    <span class="msg-time">${nowHHMM()}</span>
                </div>`;
            c.appendChild(row);
            scrollBottom();
        }

        function showTyping() {
            const c   = document.getElementById("chatContainer");
            const row = document.createElement("div");
            row.className = "msg-row bot";
            row.id        = "typingRow";
            row.innerHTML = `
                <div class="msg-avatar-wrap">
                    <div class="msg-avatar">AI</div>
                </div>
                <div class="msg-content">
                    <div class="bubble typing">Đang phân tích...</div>
                </div>`;
            c.appendChild(row);
            scrollBottom();
        }

        function removeTyping() {
            const el = document.getElementById("typingRow");
            if (el) el.remove();
        }

        // ── Progress bar ──────────────────────────────
        function buildProgressBar(ind) {
            const refStr   = ind.reference || '';
            const refMatch = refStr.match(/([\d.]+)\s*[–\-]\s*([\d.]+)/);
            if (!refMatch) return '';

            const normalMin = parseFloat(refMatch[1]);
            const normalMax = parseFloat(refMatch[2]);
            const value     = ind.value;
            const span      = (normalMax - normalMin) || 1;
            const lo        = normalMin - span * 0.5;
            const hi        = normalMax + span * 0.5;
            const range     = hi - lo;

            const normLeft  = ((normalMin - lo) / range * 100).toFixed(1);
            const normWidth = ((normalMax - normalMin) / range * 100).toFixed(1);
            const valPct    = Math.min(100, Math.max(0, (value - lo) / range * 100)).toFixed(1);

            return `
                <div class="progress-track">
                    <div class="progress-normal-zone"
                         style="left:${normLeft}%;width:${normWidth}%"></div>
                    <div class="progress-marker ${ind.color}"
                         style="left:${valPct}%"></div>
                </div>`;
        }

        // ── Rule card → renders into sidebar ─────────
        function showRuleCard(ruleOutput) {
            const sidebar = document.getElementById("sidebarInner");
            sidebar.innerHTML = ''; // clear welcome

            // Triage banner at top of sidebar
            if (ruleOutput.triage === "urgent" || ruleOutput.triage === "monitor") {
                const banner = document.createElement("div");
                if (ruleOutput.triage === "urgent") {
                    const names = (ruleOutput.critical_indicators || []).join(", ");
                    banner.innerHTML = `
                        <div class="triage-banner urgent">
                            <span class="triage-icon">⚠️</span>
                            <span>Chỉ số <strong>NGUY HIỂM</strong>${names ? ': ' + escapeHtml(names) : ''}.
                            Cần khám chuyên khoa ngay.</span>
                        </div>`;
                } else {
                    banner.innerHTML = `
                        <div class="triage-banner monitor">
                            <span class="triage-icon">⚡</span>
                            <span>Một số chỉ số cần theo dõi. Nên tái khám sớm.</span>
                        </div>`;
                }
                sidebar.appendChild(banner);
            }

            // Indicator card
            const card  = document.createElement("div");
            card.className = "rule-card";

            const order  = ["red", "yellow", "green", "gray"];
            const labels = { red: "Nguy hiểm", yellow: "Cảnh báo",
                             green: "Bình thường", gray: "Chưa xác định" };
            const groups = {};
            for (const c of order) groups[c] = ruleOutput.indicators.filter(i => i.color === c);

            let html = '<div class="rule-card-title">Kết quả phân tích</div>';

            for (const color of order) {
                const inds = groups[color];
                if (!inds.length) continue;
                if (color !== "green") {
                    html += `<div class="ind-group-label ${color}">${labels[color]}</div>`;
                }
                for (const ind of inds) {
                    html += `
                        <div class="indicator-row ${ind.color}">
                            <div class="ind-header">
                                <div class="ind-dot ${ind.color}"></div>
                                <span class="ind-name">${escapeHtml(ind.name)}</span>
                                <div class="ind-val-wrap">
                                    <div class="ind-val">${ind.value}${ind.unit ? ' ' + ind.unit : ''}</div>
                                    ${ind.reference
                                        ? `<div class="ind-ref">Tham chiếu: ${escapeHtml(ind.reference)}</div>`
                                        : ''}
                                </div>
                                <span class="ind-status ${ind.color}">${escapeHtml(ind.status)}</span>
                            </div>
                            ${buildProgressBar(ind)}
                        </div>`;
                }
            }

            if (ruleOutput.triage === "urgent") {
                html += `<div class="vinmec-cta">🏥 Đặt lịch khám tại Vinmec ngay</div>`;
            }

            card.innerHTML = html;
            sidebar.appendChild(card);

            // Re-add scenarios at bottom of sidebar
            const scenarioBlock = document.createElement("div");
            scenarioBlock.innerHTML = `
                <div class="sidebar-section-label" style="margin-top:4px">Kịch bản khác</div>
                <div class="scenario-chips">
                    <button class="scenario-chip" onclick="loadScenario('cardiac')">Tim mạch</button>
                    <button class="scenario-chip" onclick="loadScenario('diabetes')">Tiểu đường</button>
                    <button class="scenario-chip" onclick="loadScenario('kidney')">Thận</button>
                    <button class="scenario-chip" onclick="loadScenario('normal')">Bình thường</button>
                    <button class="scenario-chip" onclick="loadScenario('mixed')">Hỗn hợp</button>
                </div>`;
            sidebar.appendChild(scenarioBlock);
        }
    </script>
</body>
</html>
